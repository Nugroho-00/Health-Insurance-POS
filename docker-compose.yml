services:
  postgres:
    image: postgres:16-alpine
    container_name: health_pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-health_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-health_password}
      POSTGRES_DB: ${DB_NAME:-health_pos}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-health_user} -d ${DB_NAME:-health_pos}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: health_pos_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_pos_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-health_user}
      DB_PASSWORD: ${DB_PASSWORD:-health_password}
      DB_NAME: ${DB_NAME:-health_pos}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HMAC_SECRET: ${HMAC_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_HMAC_SECRET: ${HMAC_SECRET}
    container_name: health_pos_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
